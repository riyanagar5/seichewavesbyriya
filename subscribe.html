<section class="subscribe-section">
  <h2>Subscribe for updates</h2>
  <p>Get new essays, memos, and papers sent straight to your inbox.</p>

  <!-- Buttondown embed: replace YOUR_USERNAME with your actual Buttondown username -->
  <form action="https://buttondown.com/api/emails/embed-subscribe/YOUR_USERNAME"
        method="post"
        target="popupwindow"
        onsubmit="window.open('https://buttondown.com/YOUR_USERNAME', 'popupwindow')"
        class="subscribe-form">
    <input type="email" name="email" placeholder="your@email.com" required>
    <input type="submit" value="Subscribe">
  </form>
</section>
