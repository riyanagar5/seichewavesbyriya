{% comment %}
  Usage: {% include tag-row.html tags=page.tags %}
  Renders each tag as a clickable pill linking to /tags/<tag>/
{% endcomment %}
<div class="tag-row">
  {% for tag in include.tags %}
    {% assign slug = tag | downcase | replace: " ", "-" %}
    <a class="tag-pill" href="{{ '/tags/' | append: slug | append: '/' | relative_url }}">{{ tag }}</a>
  {% endfor %}
</div>
